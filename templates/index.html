<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortURL — Pemendek Tautan</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #08080d;
            color: #e2e0ee;
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% 30%, rgba(110,86,240,0.13) 0%, transparent 70%);
            pointer-events: none;
        }
        .wrap { width: 100%; max-width: 520px; position: relative; }

        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: up .5s ease both;
        }
        .brand h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 800;
            letter-spacing: -.04em;
            line-height: 1;
            color: #fff;
        }
        .brand h1 span {
            font-size: 1rem;
            font-weight: 400;
            color: #5a5570;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0;
            vertical-align: middle;
            margin-left: .5rem;
        }
        .brand p {
            margin-top: .5rem;
            color: #5a5570;
            font-size: .9rem;
        }

        .card {
            background: #111118;
            border: 1px solid #1c1c28;
            border-radius: 1rem;
            padding: 1.75rem;
            animation: up .5s .1s ease both;
        }
        .row { display: flex; gap: .625rem; }
        input[type="text"] {
            flex: 1;
            background: #08080d;
            border: 1px solid #1c1c28;
            border-radius: .625rem;
            padding: .8rem 1rem;
            color: #e2e0ee;
            font-family: 'Space Mono', monospace;
            font-size: .8rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        input:focus { border-color: #6e56f0; box-shadow: 0 0 0 3px rgba(110,86,240,.15); }
        input::placeholder { color: #3a3750; }
        button {
            background: #6e56f0;
            color: #fff;
            border: none;
            border-radius: .625rem;
            padding: .8rem 1.375rem;
            font-family: 'Syne', sans-serif;
            font-size: .875rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s, transform .1s;
            white-space: nowrap;
        }
        button:hover { background: #8a75f5; }
        button:active { transform: scale(.97); }

        .result {
            margin-top: 1.25rem;
            border: 1px solid #6e56f0;
            border-radius: .75rem;
            padding: 1rem 1.25rem;
            background: rgba(110,86,240,.06);
            animation: up .35s ease both;
        }
        .result-label { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .12em; color: #6e56f0; margin-bottom: .4rem; }
        .result-row { display: flex; align-items: center; gap: .625rem; justify-content: space-between; }
        .result-row a { color: #e2e0ee; text-decoration: none; font-family: 'Space Mono', monospace; font-size: .875rem; font-weight: 700; word-break: break-all; }
        .result-row a:hover { color: #a89ffa; }
        .copy-btn { background: #1c1c28; color: #7a7590; padding: .35rem .875rem; font-size: .72rem; border-radius: .5rem; flex-shrink: 0; }
        .copy-btn:hover { background: #6e56f0; color: #fff; }
        .orig { margin-top: .4rem; font-family: 'Space Mono', monospace; font-size: .72rem; color: #3a3750; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .error { margin-top: 1rem; color: #f87171; font-family: 'Space Mono', monospace; font-size: .8rem; animation: up .3s ease both; }

        footer { margin-top: 1.75rem; text-align: center; font-family: 'Space Mono', monospace; font-size: .7rem; color: #3a3750; animation: up .5s .2s ease both; }
        footer a { color: #5a5570; text-decoration: none; }
        footer a:hover { color: #a89ffa; }

        @keyframes up { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:none } }
        @media(max-width:420px) { .row { flex-direction: column; } button { width: 100%; } }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <h1>ShortURL <span>by firman</span></h1>
        <p>Memendekkan tautan panjangmu dalam satu klik.</p>
    </div>

    <div class="card">
        <form action="/shorten" method="POST">
            <div class="row">
                <input type="text" name="url" placeholder="https://tautan-panjangmu.com/..." value="{{ original_url or '' }}" required autofocus>
                <button type="submit">Singkat →</button>
            </div>
        </form>

        {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}

        {% if short_url %}
        <div class="result">
            <div class="result-label">URL SINGKAT</div>
            <div class="result-row">
                <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
                <button class="copy-btn" onclick="cp('{{ short_url }}', this)">Salin</button>
            </div>
            {% if original_url %}<div class="orig">↳ {{ original_url }}</div>{% endif %}
        </div>
        {% endif %}
    </div>

    <footer>
        <a href="/health">/health</a> &nbsp;·&nbsp; <a href="/api/urls">/api/urls</a>
    </footer>
</div>
<script>
function cp(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
        btn.textContent = '✓ Disalin';
        btn.style.background = '#4ade80';
        btn.style.color = '#000';
        setTimeout(() => { btn.textContent = 'Salin'; btn.style.background = ''; btn.style.color = ''; }, 2000);
    });
}
</script>
</body>
</html>
